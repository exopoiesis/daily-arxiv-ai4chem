name: Monthly prune (>2 years old)

on:
  workflow_dispatch:
  schedule:
    # First day of each month at 02:00 UTC.
    - cron: "0 2 1 * *"

env:
  GITHUB_USER_NAME: exopoiesis
  GITHUB_USER_EMAIL: lab@exopoiesis.space

jobs:
  prune:
    name: prune
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prune shards + popup HTML older than 2 years
        run: python tools/archive_old.py --threshold-days 730

      - name: Push prune changes
        uses: github-actions-x/commit@v2.9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Monthly prune: drop shards + popup HTML older than 2 years"
          files: data/ docs/abstracts/
          rebase: 'true'
          name: ${{ env.GITHUB_USER_NAME }}
          email: ${{ env.GITHUB_USER_EMAIL }}
