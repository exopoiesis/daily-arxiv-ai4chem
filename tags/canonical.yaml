# Canonical tags for AI4Chem arxiv-radar.
#
# Curated from TF-IDF + YAKE TOP-100 on 14,511 chemistry-filtered papers
# (March 2024 → April 2026). Min frequency: 5 mentions across corpus.
#
# Each entry:
#   <canonical-name>:
#     group: <category>
#     synonyms: [strings to match in abstract, case-insensitive, word-bounded]
#     freq: <approx total occurrences in corpus, for reference>
#
# Runtime keyword matcher (Phase 2.5) iterates synonyms and assigns canonical
# names to the paper's `tags[]` field. Multi-tagging is allowed (one paper
# can have several tags); ordering doesn't matter.
#
# Generic ML-noise terms ('model', 'machine learning', 'neural network',
# 'wide range', 'experimental data', 'computational cost', 'natural language',
# 'artificial intelligence') are intentionally NOT canonical — they appear in
# nearly every chem-ML paper and would not differentiate.

